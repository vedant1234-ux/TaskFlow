services:
  # ── Backend Web Service ──────────────────────────────────────
  - type: web
    name: taskflow-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false # You must set this manually in the Render Dashboard with your MongoDB Atlas URI
      - key: CLIENT_URL
        value: "*" # Allow all origins for the client, or set explicitly to your Render frontend URL

  # ── Frontend Static Site ─────────────────────────────────────
  - type: web
    name: taskflow-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: taskflow-server
          envVarKey: RENDER_EXTERNAL_URL
